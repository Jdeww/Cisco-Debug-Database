{% extends "base.html" %}
{% block title %}{% if post %}Edit Issue{% else %}New Issue{% endif %} — Cisco Debug Database{% endblock %}

{% block content %}
<h1 style="text-align: center">{% if post %}Edit Issue #{{ post.id }}{% else %}New Issue{% endif %}</h1>

<div class="form-card">
    <form method="post" action="{% if post %}/posts/{{ post.id }}/update{% else %}/posts/create{% endif %}">

        <div class="form-group">
            <label for="issue">Issue Description</label>
            <input type="text" id="issue" name="issue" required
                   value="{{ post.issue if post else '' }}" />
        </div>

        {% if post %}
        <div class="form-group">
            <label for="stat">Status</label>
            <select id="stat" name="stat" required>
                <option value="Issue submitted" {% if post.stat == "Issue submitted" %}selected{% endif %}>Issue Submitted</option>
                <option value="In review"       {% if post.stat == "In review"       %}selected{% endif %}>In Review</option>
                <option value="Issue resolved"  {% if post.stat == "Issue resolved"  %}selected{% endif %}>Issue Resolved</option>
            </select>
        </div>
        {% else %}
        <input type="hidden" name="stat" value="Issue submitted" />
        {% endif %}

        <div class="form-group">
            <label for="priority">Priority (0 = low)</label>
            <input type="number" id="priority" name="priority" min="0"
                   value="{{ post.priority if post else 0 }}" />
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes">{{ post.notes if post and post.notes else '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{% if post %}Save Changes{% else %}Submit Issue{% endif %}</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
